name: Deploy para Hostinger

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Build do site
        run: npm run build

      # Sync incremental (sem clean-slate): substitui/apaga só o que mudou,
      # então uma falha no meio não derruba o site inteiro.
      - name: Enviar para Hostinger via FTP
        id: ftp
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./out/
          server-dir: /domains/hbscompany.tech/public_html/
          timeout: 120000

      - name: Reenviar via FTP (2ª tentativa)
        if: steps.ftp.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./out/
          server-dir: /domains/hbscompany.tech/public_html/
          timeout: 120000
